services:
  osante:
    build:
      context: ../..
      dockerfile: cmd/server/Dockerfile
    container_name: osante
    restart: unless-stopped
    ports:
      - "3021:3000"
    volumes:
      - ./osante/:/data
    environment:
      - OSANTE_PORT=3000
      - OSANTE_DATA_DIR=/data
      - OSANTE_DB_PATH=/data/osante.db
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
