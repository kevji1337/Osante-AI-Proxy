<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSANTE // proxy</title>

    <!-- Google Fonts: JetBrains Mono (body / mono) + VT323 (display) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&family=VT323&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/ui/css/main.css">
    <link rel="stylesheet" href="/ui/css/components.css">
    <link rel="stylesheet" href="/ui/css/themes.css">
</head>
<body>
    <div id="app">
        <nav id="sidebar">
            <div class="sidebar-header">
                <h1>OSANTE</h1>
                <p class="subtitle" id="sidebar-subtitle">PROXY ADMIN · v0.1</p>
            </div>
            <ul class="nav-menu">
                <li><a href="#" data-view="dashboard" class="nav-link active">
                    <span class="icon">▤</span>
                    <span class="nav-label" data-i18n="common.dashboard">Dashboard</span>
                </a></li>
                <li><a href="#" data-view="endpoints" class="nav-link">
                    <span class="icon">⇄</span>
                    <span class="nav-label" data-i18n="common.endpoints">Endpoints</span>
                </a></li>
                <li><a href="#" data-view="stats" class="nav-link">
                    <span class="icon">▦</span>
                    <span class="nav-label" data-i18n="common.statistics">Statistics</span>
                </a></li>
                <li><a href="#" data-view="testing" class="nav-link">
                    <span class="icon">◇</span>
                    <span class="nav-label" data-i18n="common.testing">Testing</span>
                </a></li>
                <li><a href="#" data-view="logs" class="nav-link">
                    <span class="icon">▶</span>
                    <span class="nav-label" data-i18n="common.logs">Logs</span>
                </a></li>
                <li><a href="#" data-view="inspector" class="nav-link">
                    <span class="icon">◉</span>
                    <span class="nav-label" data-i18n="common.inspector">Inspector</span>
                </a></li>
            </ul>
            <div class="sidebar-footer">
                <span class="footer-uptime" id="footer-uptime">127.0.0.1</span>
                <button id="theme-toggle" class="btn-icon" title="Toggle theme">
                    <span class="icon">◐</span>
                </button>
            </div>
        </nav>
        <main id="content">
            <div id="view-container">
                <!-- Dynamic content will be loaded here -->
            </div>
        </main>
    </div>

    <!-- Modal container -->
    <div id="modal-container"></div>

    <!-- Toast notifications -->
    <div id="toast-container"></div>

    <!-- Chart.js from CDN (pinned + SRI; recompute hash on version bump) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"
            integrity="sha384-e6nUZLBkQ86NJ6TVVKAeSaK8jWa3NhkYWZFomE39AvDbQWeie9PlQqM3pmYW5d1g"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"></script>

    <!-- Application scripts -->
    <script type="module" src="/ui/js/main.js"></script>
</body>
</html>
