name: Bug report
description: Report a problem with Osante Proxy
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug, including a short reproducer if you can.
      placeholder: Tell us what went wrong.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Osante Proxy version
      description: Tag, commit, or build date.
      placeholder: e.g. v0.1.0 or main@abc1234
    validations:
      required: true

  - type: input
    id: os-arch
    attributes:
      label: OS / arch
      placeholder: e.g. Windows 11 amd64, macOS 14 arm64, Ubuntu 24.04 amd64
    validations:
      required: true

  - type: dropdown
    id: transformer
    attributes:
      label: Transformer in use
      options:
        - gitlabduo
        - claude
        - openai
        - openai_responses
        - gemini
        - other / not applicable
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Paste relevant logs from the web UI's **Logs** tab or `GET /api/logs`.
        Please redact tokens / personal data.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have redacted tokens and personal data from any logs I am sharing.
          required: true
