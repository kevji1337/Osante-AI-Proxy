name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}/${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            ext: ''
          - os: macos-latest
            platform: darwin
            arch: amd64
            ext: ''
          - os: macos-latest
            platform: darwin
            arch: arm64
            ext: ''
          - os: windows-latest
            platform: windows
            arch: amd64
            ext: '.exe'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.platform }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          out="dist/osante-proxy-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "$out" ./cmd/server
          ls -lh "$out"

      - name: Test
        if: matrix.platform == 'linux'
        run: go test ./...

      - uses: actions/upload-artifact@v4
        with:
          name: osante-proxy-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
